<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DELAY | חטיבת משרדי ממשלה</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#f5f1e8;
  --navy:#12345a;
  --blue:#3e6596;
  --gold:#c8a96a;
  --ink:#17304f;
  --muted:#6d7d8f;
  --line:rgba(18,52,90,.16);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Heebo",sans-serif;
  background:linear-gradient(135deg,var(--cream),#fffaf1);
  color:var(--ink);
}

/* LOGIN */
.login{
  min-height:100vh;
  display:grid;
  place-items:center;
}

.login-card{
  background:white;
  border-radius:30px;
  padding:40px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.1);
  max-width:420px;
}

.login-logo{
  width:140px;
  margin-bottom:15px;
}

.brand-title{
  font-family:"Playfair Display";
  font-size:50px;
  color:var(--navy);
}

.gold-line{
  width:50px;
  height:3px;
  background:var(--gold);
  margin:15px auto;
}

.login-subtitle{
  color:var(--blue);
  font-weight:700;
  margin-bottom:20px;
}

.field{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid var(--line);
}

.btn{
  width:100%;
  padding:14px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:white;
  font-weight:700;
  border:none;
  cursor:pointer;
}

/* APP */
.app{display:none}

.topbar{
  background:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
}

.hero{
  padding:40px;
}

.hero-card{
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:white;
  border-radius:30px;
  padding:40px;
}

.hero h1{
  font-family:"Playfair Display";
  font-size:46px;
}

.content{
  padding:30px;
}

/* FEES */
.fee-box{
  background:white;
  border-radius:30px;
  padding:30px;
  margin-bottom:30px;
}

.fee-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.fee-item{
  background:#f9f6ef;
  padding:18px;
  border-radius:20px;
  text-align:center;
}

.fee-item span{
  font-size:26px;
  font-weight:800;
}

/* BUTTONS GRID */
.link-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-top:25px;
}

.link-buttons a{
  position:relative;
  height:240px;
  border-radius:25px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  text-decoration:none;
  font-weight:800;
  font-size:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.link-buttons img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.link-buttons a::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(18,52,90,.7);
}

.link-buttons span{
  position:relative;
  z-index:2;
}

/* MOBILE */
@media(max-width:900px){
  .fee-grid,
  .link-buttons{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <img src="logo.png" class="login-logo">
    <div class="brand-title">DELAY</div>
    <div class="gold-line"></div>
    <div class="login-subtitle">חטיבת משרדי ממשלה</div>

    <input class="field" placeholder="אימייל">
    <input class="field" placeholder="סיסמה">

    <button class="btn" onclick="enter()">כניסה</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="topbar">
    <b>DELAY</b>
    <button onclick="logout()">יציאה</button>
  </div>

  <div class="hero">
    <div class="hero-card">
      <h1>כל הידע במקום אחד</h1>
      <p>מערכת ניהול ידע לחטיבת משרדי ממשלה</p>
    </div>
  </div>

  <div class="content">

    <!-- FEES -->
    <div class="fee-box">
      <h2>דמי טיפול מאי 2026</h2>

      <div class="fee-grid">
        <div class="fee-item">
          הזמנה עם טיסה
          <span>49.73$</span>
        </div>

        <div class="fee-item">
          הזמנה בלי טיסה
          <span>14.21$</span>
        </div>

        <div class="fee-item">
          שינוי לאחר כרטוס
          <span>11.84$</span>
        </div>
      </div>

      <!-- BIG BUTTONS -->
      <div class="link-buttons">

        <a href="https://avcohn.github.io/Delay/Airlines/" target="_blank">
          <img src="1.PNG">
          <span>חברות תעופה<br>הסכמים ממשלתיים</span>
        </a>

        <a href="https://avcohn.github.io/Delay/Hotels" target="_blank">
          <img src="2.png">
          <span>קצובת מלונות</span>
        </a>

        <a href="https://www.flightradar24.com/" target="_blank">
          <img src="3.png">
          <span>FlightRadar</span>
        </a>

        <a href="https://notebooklm.google.com/notebook/b7858b97-8884-4641-b959-1b8f877bb146" target="_blank">
          <img src="4.png">
          <span>אמדאוס<br>פקודות נפוצות</span>
        </a>

      </div>

    </div>

  </div>

</div>

<script>
function enter(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

function logout(){
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="grid";
}
</script>

</body>
</html>
