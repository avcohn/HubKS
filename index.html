<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DELAY</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f4f7fb;
    }

    .hidden{display:none}

    .center{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    img{
      width:100px;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#0b1f3a;
      color:white;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .error{
      color:red;
      margin-top:10px;
    }

    .app{
      padding:40px;
      max-width:900px;
      margin:auto;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:30px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    a{
      display:block;
      margin-top:10px;
      background:#0b1f3a;
      color:white;
      padding:10px;
      border-radius:10px;
      text-decoration:none;
      text-align:center;
    }
  </style>
</head>

<body>

<div id="login" class="center">
  <div class="card">
    <img src="logo.png" alt="logo">
    <h2>DELAY</h2>
    <p>יום אחד נלמד לעבוד</p>

    <input id="email" placeholder="מייל">
    <input id="password" type="password" placeholder="סיסמה">

    <button onclick="login()">כניסה</button>

    <div id="error" class="error"></div>
  </div>
</div>

<div id="app" class="hidden app">
  <h1>DELAY Knowledge Hub</h1>

  <div class="grid">

    <div class="box">
      <h3>נוסעים</h3>
      <a href="https://notebooklm.google.com/" target="_blank">כניסה</a>
    </div>

    <div class="box">
      <h3>הסכמי תעופה</h3>
      <a href="https://notebooklm.google.com/" target="_blank">כניסה</a>
    </div>

    <div class="box">
      <h3>קצובת מלונות</h3>
      <a href="https://avcohn.github.io/Avcohn/GovHotelRatesIL/" target="_blank">כניסה</a>
    </div>

    <div class="box">
      <h3>אמדאוס</h3>
      <a href="https://notebooklm.google.com/" target="_blank">כניסה</a>
    </div>

  </div>
</div>

<script>
const allowedEmails = [
  "avic@amsalem.com",
  "marina@amsalem.com"
];

const passwordCorrect = "Delay2026";

function login(){
  const email = document.getElementById("email").value.toLowerCase().trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  if(!allowedEmails.includes(email)){
    error.innerText = "אין לך הרשאה";
    return;
  }

  if(password !== passwordCorrect){
    error.innerText = "סיסמה שגויה";
    return;
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}
</script>

</body>
</html>
