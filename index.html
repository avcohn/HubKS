<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DELAY - Knowledge Hub</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* שימוש במשתנים מאפשר שינוי עיצוב מהיר בעתיד */
    :root {
      --primary-color: #0b1f3a;
      --primary-hover: #16365d;
      --bg-color: #f4f7fb;
      --card-bg: #ffffff;
      --text-color: #333333;
      --error-color: #d93025;
      --border-color: #cccccc;
      --transition: 0.3s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Rubik', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    .hidden { 
      display: none !important; 
    }

    /* מסך התחברות */
    .center-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      transition: transform var(--transition);
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 90px;
      margin-bottom: 15px;
    }

    .card h2 {
      margin: 0 0 5px 0;
      color: var(--primary-color);
    }

    .card p {
      margin: 0 0 25px 0;
      color: #666;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(11, 31, 58, 0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      background: var(--primary-color);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      font-family: inherit;
      transition: background-color var(--transition), transform 0.1s;
      margin-top: 10px;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    .error {
      color: var(--error-color);
      margin-top: 15px;
      font-size: 0.9rem;
      font-weight: 500;
      min-height: 20px; /* מונע קפיצת מסך כשמופיע טקסט שגיאה */
    }

    /* אזור האפליקציה */
    .app-container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app-container h1 {
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      /* הופך את הגריד לרספונסיבי לחלוטין בלי Media Queries */
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .box {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: box-shadow var(--transition), transform var(--transition);
    }

    .box:hover {
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      transform: translateY(-3px);
    }

    .box h3 {
      margin: 0 0 20px 0;
      color: var(--primary-color);
    }

    .box a {
      display: block;
      background: var(--primary-color);
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      font-weight: 500;
      transition: background-color var(--transition);
    }

    .box a:hover {
      background: var(--primary-hover);
    }
  </style>
</head>

<body>

<div id="login" class="center-wrapper">
  <div class="card">
    <img src="logo.png" alt="לוגו DELAY" onerror="this.style.display='none'">
    <h2>DELAY</h2>
    <p>יום אחד נלמד לעבוד</p>

    <div class="input-group">
      <input id="email" type="email" placeholder="מייל" aria-label="מייל">
    </div>
    <div class="input-group">
      <input id="password" type="password" placeholder="סיסמה" aria-label="סיסמה">
    </div>

    <button id="loginBtn">כניסה</button>
    <div id="error" class="error"></div>
  </div>
</div>

<div id="app" class="hidden app-container">
  <h1>DELAY Knowledge Hub</h1>
  <div class="grid">
    <div class="box">
      <h3>נוסעים</h3>
      <a href="https://notebooklm.google.com/" target="_blank" rel="noopener noreferrer">כניסה</a>
    </div>
<div class="box">
  <h3>הסכמי תעופה</h3>
  <a href="https://notebooklm.google.com/notebook/de0eede9-9e39-49cb-ad72-94299bdf4583" target="_blank" rel="noopener noreferrer">כניסה</a>
</div>
    <div class="box">
      <h3>קצובת מלונות</h3>
      <a href="https://avcohn.github.io/Avcohn/GovHotelRatesIL/" target="_blank" rel="noopener noreferrer">כניסה</a>
    </div>
    <div class="box">
      <h3>אמדאוס</h3>
      <a href="https://notebooklm.google.com/" target="_blank" rel="noopener noreferrer">כניסה</a>
    </div>
  </div>
</div>

<script>
  const allowedEmails = [
    "avic@amsalem.com",
    "marina@amsalem.com"
  ];
  const passwordCorrect = "Delay2026";

  // שמירת אלמנטים למשתנים לגישה מהירה ויעילה
  const loginContainer = document.getElementById("login");
  const appContainer = document.getElementById("app");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const errorDisplay = document.getElementById("error");
  const loginBtn = document.getElementById("loginBtn");

  function attemptLogin() {
    // איפוס שגיאות קודמות
    errorDisplay.innerText = "";
    
    const email = emailInput.value.toLowerCase().trim();
    const password = passwordInput.value.trim();

    // בדיקה ששדות לא ריקים
    if (!email || !password) {
      errorDisplay.innerText = "נא להזין מייל וסיסמה";
      return;
    }

    if (!allowedEmails.includes(email)) {
      errorDisplay.innerText = "אין לך הרשאה";
      return;
    }

    if (password !== passwordCorrect) {
      errorDisplay.innerText = "סיסמה שגויה";
      return;
    }

    // הצלחה
    loginContainer.classList.add("hidden");
    appContainer.classList.remove("hidden");
  }

  // חיבור אירוע לחיצה לכפתור (גישה נכונה יותר מ-onclick ב-HTML)
  loginBtn.addEventListener("click", attemptLogin);

  // תמיכה בלחיצה על מקש Enter
  [emailInput, passwordInput].forEach(input => {
    input.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault(); // מונע התנהגות ברירת מחדל של טפסים
        attemptLogin();
      }
    });
  });
</script>

</body>
</html>
