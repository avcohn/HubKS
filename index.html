<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hub | חטיבת משרדי ממשלה</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#f5f1e8;
  --navy:#12345a;
  --blue:#3e6596;
  --gold:#c8a96a;
  --line:rgba(18,52,90,.16);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Heebo",sans-serif;
  background:linear-gradient(135deg,var(--cream),#fffaf1);
}

/* LOGIN */
.login{
  height:100vh;
  display:grid;
  place-items:center;
}

.login-card{
  background:white;
  padding:40px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.1);
}

.login-logo{
  width:140px;
  margin-bottom:10px;
}

.brand{
  font-family:"Playfair Display";
  font-size:52px;
  color:var(--navy);
}

.line{
  width:50px;
  height:3px;
  background:var(--gold);
  margin:12px auto;
}

.btn{
  margin-top:15px;
  padding:14px;
  width:100%;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* APP */
.app{display:none}

.topbar{
  padding:15px 25px;
  background:white;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
}

.hero{
  padding:40px;
}

.hero-box{
  background:linear-gradient(135deg,var(--navy),var(--blue));
  border-radius:30px;
  padding:40px;
  color:white;
}

.hero h1{
  font-family:"Playfair Display";
  font-size:48px;
}

/* FEES */
.content{
  padding:30px;
}

.fee-box{
  background:white;
  border-radius:30px;
  padding:30px;
}

.fee-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.fee{
  background:#f8f5ee;
  padding:18px;
  border-radius:20px;
  text-align:center;
}

.fee span{
  display:block;
  font-size:26px;
  font-weight:800;
}

/* BUTTONS */
.buttons{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  position:relative;
  height:240px;
  border-radius:25px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.75);
  transition:.4s;
}

/* overlay רגיל */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(18,52,90,.6);
  transition:.4s;
}

/* HOVER – חושף תמונה */
.card:hover img{
  filter:brightness(1);
  transform:scale(1.05);
}

.card:hover::before{
  background:rgba(18,52,90,.3);
}

/* טקסט */
.card span{
  position:relative;
  z-index:2;
  text-align:center;
  font-weight:800;
  font-size:20px;
  text-shadow:0 3px 15px rgba(0,0,0,.6);
}

/* MOBILE */
@media(max-width:900px){
  .buttons,
  .fee-grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <img src="logo.png" class="login-logo">
    <div class="brand">Hub</div>
    <div class="line"></div>
    <button class="btn" onclick="enter()">כניסה</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="topbar">
    <b>Hub</b>
    <button onclick="logout()">יציאה</button>
  </div>

  <div class="hero">
    <div class="hero-box">
      <h1>כל הידע במקום אחד</h1>
    </div>
  </div>

  <div class="content">

    <div class="fee-box">
      <h2>דמי טיפול מאי 2026</h2>

      <div class="fee-grid">
        <div class="fee">הזמנה עם טיסה<span>49.73$</span></div>
        <div class="fee">הזמנה בלי טיסה<span>14.21$</span></div>
        <div class="fee">שינוי לאחר כרטוס<span>11.84$</span></div>
      </div>

      <div class="buttons">

        <a class="card" href="https://avcohn.github.io/Delay/Airlines/" target="_blank">
          <img src="1.PNG">
          <span>חברות תעופה<br>הסכמים ממשלתיים</span>
        </a>

        <a class="card" href="https://avcohn.github.io/Delay/Hotels" target="_blank">
          <img src="2.jpg">
          <span>קצובת מלונות</span>
        </a>

        <a class="card" href="https://www.flightradar24.com/" target="_blank">
          <img src="3.jpg">
          <span>FlightRadar</span>
        </a>

        <a class="card" href="https://notebooklm.google.com/notebook/b7858b97-8884-4641-b959-1b8f877bb146" target="_blank">
          <img src="4.jpg">
          <span>אמדאוס<br>פקודות נפוצות</span>
        </a>

      </div>

    </div>

  </div>

</div>

<script>
function enter(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}
function logout(){
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="grid";
}
</script>

</body>
</html>
