<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DELAY · הסכמי תעופה ממשלתיים</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:    #0b1a2e;
  --navy2:   #0f2340;
  --line:    rgba(255,255,255,.09);
  --line2:   rgba(255,255,255,.05);
  --text:    #e8f0fb;
  --muted:   #6e8aaa;
  --muted2:  #9ab0cb;
  --green:   #22c55e;
  --blue-lt: #3b82f6;
  --mono:    "JetBrains Mono", monospace;
  --sans:    "Heebo", sans-serif;
  --tr:      .16s ease;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ font-family:var(--sans); background:var(--navy); color:var(--text); min-height:100vh; }

/* HEADER */
header{
  background:linear-gradient(160deg,#081525 0%,var(--navy2) 60%,#102038 100%);
  border-bottom:1px solid var(--line);
  padding:28px 24px 0;
  position:relative; overflow:hidden;
}
header::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 5% 50%,rgba(29,78,216,.18) 0%,transparent 70%),
             radial-gradient(ellipse 40% 60% at 95% 20%,rgba(59,130,246,.10) 0%,transparent 60%);
  pointer-events:none;
}
.wrap{ max-width:1240px; margin:0 auto; }
.header-top{ display:flex; align-items:center; gap:20px; position:relative; z-index:1; }
.logo-wrap{
  width:72px; height:72px; border-radius:20px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14);
  display:grid; place-items:center; flex-shrink:0; overflow:hidden; padding:6px;
}
.logo-wrap img{ width:100%; height:100%; object-fit:contain; filter:brightness(1.1) contrast(1.05); }
.app-name{ font-size:clamp(32px,5vw,52px); font-weight:900; letter-spacing:-.04em; line-height:1; color:#fff; }
.app-sub{ margin-top:5px; color:var(--muted2); font-size:14px; }
.header-search{
  position:relative; z-index:1; padding:22px 0 0;
  display:flex; gap:12px; align-items:center;
  border-top:1px solid var(--line2); margin-top:22px;
}
.search-icon{ color:var(--muted); font-size:18px; flex-shrink:0; }
#searchInput{
  flex:1; background:transparent; border:none; outline:none;
  font-family:var(--sans); font-size:17px; font-weight:500; color:var(--text);
  padding:8px 0 14px; caret-color:var(--blue-lt);
}
#searchInput::placeholder{ color:var(--muted); }
.search-count{ font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.04em; padding-bottom:14px; white-space:nowrap; }

/* MAIN */
main{ padding:24px 24px 56px; }
.grid{ max-width:1240px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }

/* CARD */
.card{
  background:var(--navy2); border:1px solid var(--line); border-radius:20px;
  overflow:hidden; transition:transform var(--tr),border-color var(--tr),box-shadow var(--tr);
  animation:fadeIn .3s ease both;
}
@keyframes fadeIn{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.card:hover{ transform:translateY(-3px); border-color:rgba(59,130,246,.3); box-shadow:0 16px 40px rgba(0,0,0,.35); }

.card-head{
  padding:14px 16px 12px; display:flex; justify-content:space-between;
  align-items:flex-start; gap:12px; position:relative; overflow:hidden;
}
.card-head::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 60%);
  pointer-events:none;
}
.airline-info{ flex:1; min-width:0; }
.airline-name{ font-size:17px; font-weight:800; color:#fff; line-height:1.2; letter-spacing:-.02em; }
.codes{ display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
.code{
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.92); padding:3px 8px; border-radius:999px;
  font-size:11px; font-weight:700; font-family:var(--mono); letter-spacing:.04em;
}
.airline-logo{
  width:48px; height:48px; border-radius:12px; background:white; padding:6px;
  object-fit:contain; flex-shrink:0; box-shadow:0 6px 16px rgba(0,0,0,.25); z-index:1;
}

/* CARD BODY */
.card-body{ padding:14px 16px 16px; display:flex; flex-direction:column; gap:10px; }
.cmd-row{ display:flex; flex-direction:column; gap:4px; }
.cmd-label{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
.cmd-val{
  position:relative; background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.07);
  border-radius:10px; padding:8px 38px 8px 10px; font-family:var(--mono); font-size:12.5px;
  color:#a8d4ff; overflow-x:auto; white-space:nowrap; cursor:default;
  transition:border-color var(--tr),background var(--tr); scrollbar-width:none;
}
.cmd-val::-webkit-scrollbar{ display:none; }
.cmd-val:hover{ border-color:rgba(59,130,246,.35); background:rgba(29,78,216,.12); }
.copy-btn{
  position:absolute; left:6px; top:50%; transform:translateY(-50%);
  width:26px; height:26px; border-radius:7px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  color:var(--muted2); font-size:12px; display:grid; place-items:center;
  cursor:pointer; transition:background var(--tr),color var(--tr); flex-shrink:0;
}
.copy-btn:hover{ background:rgba(59,130,246,.25); color:#fff; }
.copy-btn.copied{ background:rgba(34,197,94,.2); color:var(--green); border-color:rgba(34,197,94,.3); }
.card-divider{ height:1px; background:var(--line2); margin:2px 0; }
.notes{ list-style:none; display:flex; flex-direction:column; gap:0; }
.notes li{
  padding:6px 0; border-bottom:1px solid var(--line2);
  font-size:13px; color:var(--muted2); line-height:1.5;
  display:flex; gap:8px; align-items:flex-start;
}
.notes li:last-child{ border-bottom:none; }
.notes li::before{ content:"·"; color:var(--blue-lt); font-size:16px; line-height:1.2; flex-shrink:0; }

/* NO RESULTS */
#noResults{ display:none; text-align:center; padding:64px 24px; color:var(--muted); max-width:1240px; margin:0 auto; }
#noResults strong{ display:block; font-size:20px; color:var(--text); margin-bottom:8px; }
mark{ background:rgba(251,191,36,.28); color:#fde68a; border-radius:3px; padding:0 2px; }

footer{ text-align:center; padding:20px 24px 32px; color:var(--muted); font-size:12px; border-top:1px solid var(--line2); }

@media(max-width:1100px){ .grid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:680px){
  header{ padding:20px 16px 0; }
  .logo-wrap{ width:56px; height:56px; border-radius:14px; }
  .app-name{ font-size:30px; }
  main{ padding:16px 14px 48px; }
  .grid{ grid-template-columns:1fr; gap:12px; }
  .cmd-val{ font-size:11.5px; }
}
</style>

    </div>
    <div class="header-search">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="search" placeholder="חברה, קוד, פקודה, Tour Code, יעד..." autocomplete="off" spellcheck="false"/>
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>
</header>

<main>

const cardsEl  = document.getElementById("cards");
const noResult = document.getElementById("noResults");
const searchEl = document.getElementById("searchInput");
const countEl  = document.getElementById("searchCount");
let debounce;

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function highlight(text,q){
  if(!q) return esc(text);
  const safe=q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return esc(text).replace(new RegExp(`(${safe})`,"gi"),"<mark>$1</mark>");
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✓"; btn.classList.add("copied");
    setTimeout(()=>{ btn.textContent="⧉"; btn.classList.remove("copied"); },1400);
  }).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=text; ta.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    btn.textContent="✓"; btn.classList.add("copied");
    setTimeout(()=>{ btn.textContent="⧉"; btn.classList.remove("copied"); },1400);
  });
}

function cmdRow(label,value,q){
  const rawVal = value.replace(/'/g,"\\'");
  return `<div class="cmd-row">
    <div class="cmd-label">${label}</div>
    <div class="cmd-val">${highlight(value,q)}<button class="copy-btn" title="העתק" onclick="copyText('${rawVal}',this)">⧉</button></div>
  </div>`;
}

function render(list,q){
  cardsEl.innerHTML="";
  noResult.style.display=list.length?"none":"block";
  countEl.textContent=list.length<airlines.length?`${list.length} / ${airlines.length}`:`${airlines.length} הסכמים`;

  list.forEach((a,i)=>{
    const card=document.createElement("article");
    card.className="card";
    card.style.animationDelay=`${i*0.04}s`;

    const corpParts=a.corporate.split(" · ");
    const corpRows=corpParts.map((c,idx)=>cmdRow(idx===0?"קורפורייט / Tour Code / OSI":"",c,q)).join("");

    card.innerHTML=`
      <div class="card-head" style="background:linear-gradient(135deg,${a.color}dd,${a.color}88);">
        <div class="airline-info">
          <div class="airline-name">${highlight(a.name,q)}</div>
          <div class="codes">${a.codes.map(c=>`<span class="code">${highlight(c,q)}</span>`).join("")}</div>
        </div>
        <img class="airline-logo" src="${a.logo}" alt="${a.name}" loading="lazy" onerror="this.style.display='none'"/>
      </div>
      <div class="card-body">
        ${cmdRow("פקודת תמחור",a.price,q)}
        ${cmdRow("אמצעי תשלום",a.payment,q)}
        ${corpRows}
        <div class="card-divider"></div>
        <ul class="notes">${a.notes.map(n=>`<li>${highlight(n,q)}</li>`).join("")}</ul>
      </div>`;
    cardsEl.appendChild(card);
  });
}

searchEl.addEventListener("input",e=>{
  clearTimeout(debounce);
  debounce=setTimeout(()=>{
    const q=e.target.value.trim().toLowerCase();
    render(q?airlines.filter(a=>[a.name,...a.codes,a.price,a.payment,a.corporate,...a.notes].join(" ").toLowerCase().includes(q)):airlines,q);
  },60);
});

render(airlines,"");
</script>
